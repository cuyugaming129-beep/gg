<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Play Music</title>
</head>

<body style="background:black;color:white;text-align:center;margin-top:120px;font-family:sans-serif;">

<h2>🎵 Music Playing...</h2>

<audio id="music" loop>
<source src="indrakilla.mp3" type="audio/mpeg">
</audio>

<script>
var music = document.getElementById("music");

function playMusic(){
    music.play().catch(function(){});
}

playMusic();

document.addEventListener("click", playMusic);
document.addEventListener("touchstart", playMusic);
</script>

</body>
</html>
