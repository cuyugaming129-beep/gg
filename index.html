<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Play Music</title>
</head>

<body style="background:black;color:white;text-align:center;margin-top:120px;font-family:sans-serif;">

<h2>🎵 Music Playing...</h2>

<audio id="audio" loop>
  <source src="indrakilla.mp3" type="audio/mpeg">
</audio>

<script>
var audio = document.getElementById("audio");

function playAudio(){
    audio.play();
}

playAudio();
document.body.addEventListener("click", playAudio);
</script>

</body>
</html>
